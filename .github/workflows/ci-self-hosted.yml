name: CI and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: tcoaching-master
  cancel-in-progress: true

jobs:
  test:
    name: Test on self-hosted runner
    runs-on:
      - self-hosted
      - Windows
      - X64

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run tests
        shell: pwsh
        run: .\mvnw.cmd -q test

  deploy:
    name: Deploy to Railway
    needs: test
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      secrets.RAILWAY_TOKEN != '' &&
      vars.RAILWAY_PROJECT_ID != '' &&
      vars.RAILWAY_ENVIRONMENT_NAME != '' &&
      vars.RAILWAY_SERVICE_NAME != ''
    runs-on:
      - self-hosted
      - Windows
      - X64

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_NAME: ${{ vars.RAILWAY_ENVIRONMENT_NAME }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build package
        shell: pwsh
        run: .\mvnw.cmd -q -DskipTests package

      - name: Install Railway CLI
        shell: pwsh
        run: npm install --global @railway/cli@latest

      - name: Deploy to Railway
        shell: pwsh
        run: >
          railway up
          --ci
          --service "$env:RAILWAY_SERVICE_NAME"
          --environment "$env:RAILWAY_ENVIRONMENT_NAME"
          --project "$env:RAILWAY_PROJECT_ID"
