spring.application.name=TCoaching

spring.main.banner-mode=off

########################################
# Logging
########################################
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.apache.catalina=INFO
logging.level.org.apache.tomcat=INFO
logging.level.web=OFF

########################################
# DevTools
########################################
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.devtools.add-properties=false

########################################
# Server
########################################
server.port=${PORT:8080}
server.servlet.context-path=/

########################################
# Profiles
########################################

########################################
# Jackson / JSON
########################################
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_null

########################################
#SQL PROPERTIES
########################################
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
logging.level.org.springframework.jdbc.core=INFO

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

########################################
# Security hardening
########################################
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-stacktrace=never
spring.web.error.include-exception=false
spring.web.error.whitelabel.enabled=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
security.require-https=${SECURITY_REQUIRE_HTTPS:false}
security.admin.require-non-default=${SECURITY_ADMIN_REQUIRE_NON_DEFAULT:false}

########################################
# Admin login
########################################
security.admin.username=${ADMIN_USER:}
security.admin.password=${ADMIN_PASSWORD:}

########################################
# DDoS and request hardening
########################################
security.rate-limit.enabled=true
# Enable only when behind a trusted reverse proxy (also enables ForwardedHeaderFilter).
security.rate-limit.use-forwarded-headers=false
security.rate-limit.requests-per-minute=180

########################################
# Captcha
########################################
contact.captcha.enabled=${CAPTCHA_ENABLED:false}
contact.captcha.site-key=${CAPTCHA_SITE_KEY:}
contact.captcha.secret=${CAPTCHA_SECRET:}
contact.captcha.verify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify

server.tomcat.max-connections=200
server.tomcat.accept-count=50
server.tomcat.connection-timeout=10s
server.tomcat.keep-alive-timeout=20s
server.tomcat.max-keep-alive-requests=100
server.tomcat.max-http-header-size=16KB
server.tomcat.max-http-form-post-size=1MB
server.tomcat.max-swallow-size=2MB
server.server-header=TCoaching
server.compression.enabled=true
server.compression.mime-types=text/html,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,image/svg+xml
server.compression.min-response-size=2KB

########################################
# Email notifications
########################################
contact.notification.enabled=true
contact.notification.to=${MAIL_TO:${MAIL_USER:}}
contact.notification.from=${MAIL_FROM:${MAIL_USER:}}
contact.notification.subject=New contact request

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
